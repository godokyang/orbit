schema_version: orbit-task-v1
schema_semantics:
  feature_versions:
    evidence_level: v1
    quality_outcome: v1
    schema_semantics: v1
project: example
target_role: reviewer
task_type: slice_review
gates: []
source_documents: []
source_contract:
  required_outcomes: []
  out_of_scope: []
  cleanup_plan: []
traceability: []
quality_rules: []
plan: docs/open/example/implementation-plan.md
slice: S1
scope:
  include: []
  exclude: []
artifact_policy:
  generated: exclude_by_default
  build_outputs: exclude_by_default
  orbit_runtime: exclude_by_default
  runtime_artifacts: preserve_or_hash_before_delete
destructive_actions:
  required_protocol: true
  require_user_confirmation: true
write_policy_enforcement: standard
quality_outcome:
  user_problem: "The current behavior, structure, or workflow creates a concrete maintenance, reliability, or user problem."
  desired_property: "The completed task changes the system property that caused the problem, not only the surface action."
  measurable_thresholds:
    - "Acceptance evidence demonstrates the desired property rather than only showing that code changed."
    - "Reviewer can explain why the original problem is reduced or closed."
    - "Known gaps are explicit and do not cover required acceptance."
  invalid_completions:
    - "Completing the requested action while the original problem remains."
    - "Only proving that existing tests pass without evidence for the quality outcome."
    - "Using a workaround, fallback, or manual artifact to mask an unclosed implementation path."
acceptance: []
invalid_completion_guards: []
review_strategy:
  required_questions:
    - outcome
    - counterexamples
    - evidence_sufficiency
    - residual_risk
  entrypoints:
    - quality_outcome
    - acceptance
    - changed_files
    - evidence
  minimum_evidence_level: ""
  suggested_checks:
    - "Outcome: does the change satisfy the quality_outcome, not just the requested action?"
    - "Behavior: are required user, CLI, or runtime behaviors correct and fail-closed?"
    - "Structure: did the change reduce coupling, duplicate truth, or future change cost?"
    - "Evidence: do tests, commands, artifacts, or reports prove the outcome?"
    - "Residual risk: are untested paths explicit and acceptable?"
    - "Report evidence_level; do not report mechanical checks as outcome quality."
    - "Explain rule_application for runtime rules used in this task."
    - "List confirmed, assumed, and missing evidence separately."
  runtime_checks:
    - "Inspect latest structured review/test evidence before done."
    - "Check aggregate evidence verdict and required gates."
  required_capabilities:
    - review.submit
  failure_modes:
    - "Review only checks that tests passed."
    - "Review ignores empty or action-only quality_outcome."
    - "Review accepts local pass while source contract or traceability remains uncovered."
evidence_requirements: []
design_lifecycle:
  enabled: false
  phases:
    - drafting
    - review_requested
    - changes_requested
    - user_confirmed
    - coding_ready
  current_phase: ""
  user_confirmation_required: true
  coding_requires_confirmed_design: true
design_reference:
  required_for_coding: false
  artifact: ""
  confirmation_evidence: ""
  status: not_applicable
implementation_plan:
  required: false
  path: ""
  summary: ""
decomposition:
  parent_task: ""
  child_slices: []
  aggregate_outcome_metrics: []
  stop_conditions: []
  replanning_path: ""
final_aggregate_audit:
  required: false
  checks: []
test_level: not_applicable
test_environment:
  required: false
  environment: ""
  test_tab_or_pane: ""
  server_owner: ""
  browser_owner: ""
  cleanup_hook: ""
  artifact_cleanup: ""
  duration_budget: ""
  resource_budget: ""
quality_measurement:
  required: false
  baseline_required: false
  after_required: false
  metrics: []
  waiver_policy: ""
parent_goal:
  required: false
  id: ""
  objective: ""
  done_criteria: []
  non_goals: []
parent_goal_status:
  state: not_applicable
  active_slice: ""
  done_criteria_status: []
  remaining_blockers: []
  required_gates: {}
  user_next_action:
    default: not_applicable
    options: []
    waiting_on: ""
    blocked_by: ""
    do_not_do: []
worktree_safety:
  require_status_check: true
  before_public_action:
    - git status --short --branch -uall
    - git rev-parse HEAD
release_surface:
  required_when_applicable:
    - version_fields
    - generated_artifacts
    - package_or_archive_contents
    - release_assets_or_registry_state
supply_chain:
  third_party_tools: []
tool_requirements:
  service_controlled:
    - "通过 evidence manifest 提交 review/test verdict。"
    - "通过 lead 或受控工具推进 loop state。"
  agent_discoverable: []
must_answer:
  - "quality outcome 是否已经满足？"
  - "每个 acceptance 项是否都有 evidence？"
  - "required capabilities 是否已满足，或已明确 blocked？"
  - "failure modes 是否已经被 evidence 排除？"
  - "是否存在 High 或 Medium findings？"
final_audit:
  required: true
  checks:
    - "source contract 和 traceability 是否逐条有证据。"
    - "旧路径、旧 fallback、旧 writer 是否关闭。"
    - "真实 E2E / dogfood 是否已跑；未跑时 residual risk 是否明确。"
stop_policy:
  done_when:
    - quality_outcome_satisfied
    - reviewer_no_high_or_medium
    - required_tests_passed_or_waived
  escalate_when:
    - role_conflict
    - missing_operating_model_for_reviewer_or_tester
    - same_failure_repeated_3_times
    - budget_exceeded
  default_fail_if:
    - no_evidence_manifest
    - no_quality_outcome_for_improvement_task
    - review_or_test_verdict_unclear
